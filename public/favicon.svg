<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Cream background -->
  <circle cx="16" cy="16" r="16" fill="#faf9f6"/>

  <!-- Outer sage ring -->
  <circle cx="16" cy="16" r="14.5" fill="none" stroke="#7c8a7c" stroke-width="0.9"/>

  <!-- Botanical leaves — top arc -->
  <ellipse cx="16" cy="3.8" rx="1.1" ry="2" fill="#7c8a7c"/>
  <ellipse cx="12.6" cy="5" rx="1" ry="1.8" fill="#7c8a7c" transform="rotate(-28 12.6 5)"/>
  <ellipse cx="19.4" cy="5" rx="1" ry="1.8" fill="#7c8a7c" transform="rotate(28 19.4 5)"/>

  <!-- Botanical leaves — bottom arc -->
  <ellipse cx="16" cy="28.2" rx="1.1" ry="2" fill="#7c8a7c"/>
  <ellipse cx="12.6" cy="27" rx="1" ry="1.8" fill="#7c8a7c" transform="rotate(28 12.6 27)"/>
  <ellipse cx="19.4" cy="27" rx="1" ry="1.8" fill="#7c8a7c" transform="rotate(-28 19.4 27)"/>

  <!-- Inner divider ring -->
  <circle cx="16" cy="16" r="11" fill="none" stroke="#7c8a7c" stroke-width="0.4" opacity="0.6"/>

  <!-- "N" lettermark -->
  <!-- Left vertical -->
  <line x1="11" y1="10.5" x2="11" y2="21.5" stroke="#2d312d" stroke-width="1.9" stroke-linecap="round"/>
  <!-- Diagonal -->
  <line x1="11" y1="10.5" x2="21" y2="21.5" stroke="#2d312d" stroke-width="1.9" stroke-linecap="round"/>
  <!-- Right vertical -->
  <line x1="21" y1="10.5" x2="21" y2="21.5" stroke="#2d312d" stroke-width="1.9" stroke-linecap="round"/>
</svg>
